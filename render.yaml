services:
  - type: web
    name: cgi-website
    runtime: node
    repo: https://github.com/quantumadventurer11/cgi-website
    branch: main
    plan: starter
    region: oregon
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    disk:
      name: cgi-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_PATH
        value: /var/data/cgi.sqlite
      - key: ADMIN_TOKEN
        generateValue: true
      - key: MAIL_TO
        value: contact@celestialgovernance.org
      - key: MAIL_FROM
        value: CGI Website <no-reply@celestialgovernance.org>
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
