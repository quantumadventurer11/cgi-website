<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>CGI Applications Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section class="admin-panel">
      <div class="admin-heading">
        <img src="/assets/cgi-logo-mark-transparent.png" alt="Celestial Governance Institute logo" width="64" height="64">
        <div>
          <p class="section-kicker">Protected Admin</p>
          <h1>Membership Applications</h1>
        </div>
      </div>
      <form class="admin-token-form" id="admin-login-form">
        <label for="admin-username">Username</label>
        <input id="admin-username" name="username" type="text" autocomplete="username" required>
        <label for="admin-password">Password</label>
        <div class="token-row">
          <input id="admin-password" name="password" type="password" autocomplete="current-password" required>
          <button class="button button-primary" type="submit">Sign In</button>
        </div>
      </form>
      <p class="form-status" id="admin-status" role="status" aria-live="polite"></p>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Affiliation</th>
              <th>Interest</th>
              <th>Message</th>
              <th>Created</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="applications-body">
            <tr><td colspan="7">Sign in to load applications.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="/admin.js" defer></script>
</body>
</html>
